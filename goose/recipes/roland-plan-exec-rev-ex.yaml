id: roland-plan-exec-rev-ex
version: 1.0.0
title: "Roland PlanExecRevEx \u2014 4-Agent Coding Loop"
description: "Autonomous coding loop: plan \u2192 execute \u2192 review \u2192 explain"
instructions: |-
  You are the dispatcher orchestrating a 4-agent coding workflow.
  Spawn each step as a separate subagent on the appropriate model.

  ## Step 1: Plan (google/gemini-2.5-pro)
  Spawn a planner subagent. It should break the task into detailed steps,
  required files, dependencies, best practices, and risks.
  Capture its full output.

  ## Step 2: Execute (deepseek/deepseek-chat)
  Spawn an executor subagent. Pass the planner's output as context.
  It should implement the plan: edit/create files, install deps, run tests.
  Capture its full output.

  ## Step 3: Review (google/gemini-2.5-pro)
  Spawn a reviewer subagent. Pass the executor's output as context.
  It should check for bugs, performance issues, security vulnerabilities,
  and code smells. If critical issues are found, spawn another executor
  subagent to fix them (max 3 loops).
  Capture its full output.

  ## Step 4: Explain (google/gemini-2.5-flash)
  Spawn an explainer subagent. Pass the final code and review output.
  It should summarize what was done, key decisions, and trade-offs.

  Return the combined result to the user.

  ## Cost estimate
  ~$0.08 per run at ~50K tokens/step.
extensions:
  - name: developer
    timeout: 300
  - name: roland
    timeout: 60
