name: DocumentationRefactor
version: "2.0.0"
description: "Multi-agent workflow to analyze entire codebase, extract existing documentation, and generate/clean up comprehensive docs"

metadata:
  category: "Documentation"
  complexity: "high"
  estimatedCost: 0.05
  estimatedDuration: "10-20 minutes"
  tags: ["documentation", "codebase-analysis", "generation", "refactoring", "quality"]

agents: [analyst, architect, writer, critic, executor]

variables:
  codebasePath: "."
  focusAreas: "all modules and features"
  targetAudience: "developers"

input_variables:
  - codebasePath
  - focusAreas
  - targetAudience

steps:
  - name: analyze-codebase
    agent: analyst
    input: |
      You are analyzing a codebase for documentation purposes.
      Codebase path: {{codebasePath}}
      Focus areas: {{focusAreas}}
      Target audience: {{targetAudience}}

      STEP 1 — Use tools to read these files (do this BEFORE writing anything):
        - Use read_file to read "package.json" (or requirements.txt, Cargo.toml, etc.)
        - Use read_file to read "tsconfig.json" (or equivalent config)
        - Use list_files to list the root directory
        - Use list_files on the "src" directory (if it exists)
        - Use read_file on the main README

      STEP 2 — Based ONLY on what the tools returned, write a structured analysis:
        1. Project identity: name, language, runtime, package manager (from config files)
        2. Dependencies: list actual deps from package.json/requirements.txt
        3. Directory structure: from list_files results
        4. Key modules and entry points: from src/ listing
        5. Existing documentation: which .md files exist at root and docs/
        6. Features: only those described in existing docs or inferable from code structure
        7. Gaps: documentation that is missing or incomplete

      CRITICAL: Every claim must cite a file path. If you did not read a file, do not describe it.
    output_to: analyze_codebase

  - name: plan-documentation
    agent: architect
    input: |
      Create a documentation plan based on this codebase analysis.

      Codebase Analysis (from actual file reads):
      {{analyze_codebase}}

      Focus areas: {{focusAreas}}
      Audience: {{targetAudience}}

      RULES:
      - Only plan docs for features/modules that appear in the analysis above.
      - If a doc already exists, plan updates — not replacement.
      - Use the exact technology names from the analysis (language, framework, package manager).
      - Do not introduce technologies or features not mentioned in the analysis.

      Plan sections for: README, API docs, architecture overview, setup guide, contributing guide.
      For each section specify: purpose, key content points, source files to reference.
    output_to: plan_documentation

  - name: generate-docs
    agent: writer
    input: |
      You are a technical writer. Your task is to write documentation RIGHT NOW.
      Do NOT say you are ready. Do NOT ask questions. Do NOT describe what you will do.
      START WRITING THE DOCUMENTATION IMMEDIATELY.

      Use read_file to read any source files you need for accuracy.

      Here is the documentation plan to follow:
      {{plan_documentation}}

      Here is the codebase analysis for reference:
      {{analyze_codebase}}

      Target audience: {{targetAudience}}

      RULES:
      - All code examples must use TypeScript (the project's language).
      - All CLI commands must use npm (the project's package manager).
      - All dependency names must match what is in the actual config files.
      - If you are unsure about something, write "[NEEDS VERIFICATION]" instead of guessing.
      - Do NOT create files — only output the documentation as text.

      OUTPUT FORMAT: Write each document as a fenced markdown block with the filename.
      You MUST produce ALL of the following documents NOW:

      ```markdown file=ReadMe.MD
      (write the full README here — project overview, features, quick start, architecture)
      ```

      ```markdown file=docs/api.md
      (write the full API documentation here — key APIs, interfaces, usage patterns)
      ```

      ```markdown file=INSTALLATION.md
      (write the full setup guide here — installation, configuration, first run)
      ```

      ```markdown file=CONTRIBUTING.md
      (write the full contributing guide here — development setup, code style, PR process)
      ```

      BEGIN WRITING NOW. Output the first document immediately.
    output_to: generate_docs

  - name: review-quality
    agent: critic
    input: |
      Review these generated docs for factual accuracy against the codebase analysis.

      Generated Documentation:
      {{generate_docs}}

      Original Codebase Analysis (source of truth):
      {{analyze_codebase}}

      Audience: {{targetAudience}}

      CHECK EACH ITEM:
      1. Does every technology name match what's in the analysis? (language, framework, deps)
      2. Are CLI commands correct for the actual package manager?
      3. Do file paths reference real files from the analysis?
      4. Are described features actually present in the codebase?
      5. Are code examples in the correct programming language?

      Output:
      - PASS/FAIL for each document
      - List of specific factual errors with corrections
      - Overall quality score (1-10)
    output_to: review_quality

  - name: finalize-docs
    agent: executor
    allow_file_writes: true
    input: |
      You MUST write documentation files to disk using the write_file tool.
      Do NOT just output text. Do NOT say you are ready. Do NOT ask questions.
      START WRITING FILES IMMEDIATELY using write_file.

      Here is the review feedback — apply these corrections:
      {{review_quality}}

      Here is the documentation to fix and save:
      {{generate_docs}}

      Here is the ground truth analysis:
      {{analyze_codebase}}

      EXECUTE THESE STEPS NOW:

      Step 1: Read the generated documentation above.
      Step 2: Apply all corrections from the review feedback.
      Step 3: For EACH document, call write_file to save it:

        - Call write_file with filePath="ReadMe.MD" and the corrected README content
        - Call write_file with filePath="docs/api.md" and the corrected API docs
        - Call write_file with filePath="INSTALLATION.md" and the corrected setup guide
        - Call write_file with filePath="CONTRIBUTING.md" and the corrected contributing guide

      Step 4: After writing ALL files, list which files you wrote.

      IMPORTANT: You have permission to overwrite existing files.
      START NOW. Call write_file for the first document immediately.
    output_to: documentation_package

outputs:
  documentation_package: documentation_package
  codebase_analysis: analyze_codebase
  documentation_plan: plan_documentation
  quality_report: review_quality

success_criteria:
  - "All technologies match actual project config files"
  - "README provides accurate project overview and quick start"
  - "No hallucinated features or incorrect language references"
  - "Setup guide uses correct package manager and commands"
  - "Documentation reflects current codebase state"
  - "Code examples are in the correct programming language"
