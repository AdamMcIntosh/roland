name: DocumentationRefactor
version: "2.0.0"
description: "Multi-agent workflow to analyze entire codebase, extract existing documentation, and generate/clean up comprehensive docs"

metadata:
  category: "Documentation"
  complexity: "high"
  estimatedCost: 0.05
  estimatedDuration: "10-20 minutes"
  tags: ["documentation", "codebase-analysis", "generation", "refactoring", "quality"]

agents: [analyst, architect, writer, critic, executor]

input_variables:
  - codebasePath
  - focusAreas
  - targetAudience

steps:
  - name: analyze-codebase
    agent: analyst
    input: |
      Analyze the codebase at {{codebasePath}} for documentation purposes.
      Focus areas: {{focusAreas}}
      Target audience: {{targetAudience}}

      REQUIREMENTS:
      - Use the file tools to list and read real files in the repository.
      - Start by listing the repository root, then read existing markdown docs (README, docs/, guides).
      - Do not assume frameworks, stacks, or features not present in the files.
      - Cite concrete file paths in your analysis.

      Include:
      1. Directory structure and main modules (from actual files)
      2. Key files and entry points (by file path)
      3. Architecture overview and data flows (from code/docs)
      4. Dependencies and their roles (from package.json/lock files)
      5. Existing documentation and gaps (from markdowns)
      6. Code patterns and conventions (from code)
      7. Technology stack and versions (from config files)
      8. Key features and configuration (from config/README)

      Output structured analysis in Markdown with file references.
    output_to: analyze_codebase

  - name: plan-documentation
    agent: architect
    input: |
      Based on the analysis below, create a documentation plan with priorities and sections.

      Analysis:
      {{analyze_codebase}}

      Focus areas: {{focusAreas}}
      Audience: {{targetAudience}}

      REQUIREMENTS:
      - Base all recommendations on actual files discovered.
      - If a doc already exists, propose edits instead of inventing new content.
      - Do not add technologies or features not present in the codebase.

      Include plans for README, API docs, architecture, setup, contributing, and inline comments.
    output_to: plan_documentation

  - name: generate-docs
    agent: writer
    input: |
      Generate documentation following the plan below. Use clear Markdown, examples, and cross-links.

      Plan:
      {{plan_documentation}}

      Audience: {{targetAudience}}

      REQUIREMENTS:
      - Use facts only from the repository and existing markdowns.
      - If a doc exists, refine it; do not fabricate features.
      - When referencing files, use actual paths.
      - If a section is unknown, explicitly mark it as "Unknown" and explain what is missing.

      Produce:
      1. README.md
      2. API_DOCUMENTATION.md
      3. ARCHITECTURE.md
      4. SETUP_GUIDE.md
      5. CONTRIBUTING.md
      6. CODE_COMMENTS guidance
    output_to: generate_docs

  - name: review-quality
    agent: critic
    input: |
      Review the generated docs for completeness, clarity, accuracy, and consistency.

      Docs:
      {{generate_docs}}

      Audience: {{targetAudience}}

      REQUIREMENTS:
      - Flag any claims not backed by repository files.
      - Ensure all technologies mentioned exist in package.json or code.

      Output a quality assessment and a list of issues by severity.
    output_to: review_quality

  - name: finalize-docs
    agent: executor
    input: |
      Finalize the documentation based on the review feedback.

      Review feedback:
      {{review_quality}}

      Docs to finalize:
      {{generate_docs}}

      Add polishing (TOC, links) and validate examples.
    output_to: documentation_package

outputs:
  documentation_package: documentation_package
  codebase_analysis: analyze_codebase
  documentation_plan: plan_documentation
  quality_report: review_quality

success_criteria:
  - "All major codebase components are documented"
  - "README provides clear project overview and quick start"
  - "API documentation is complete and accurate"
  - "Architecture is clearly explained with diagrams/descriptions"
  - "Setup guide enables new users to get started quickly"
  - "No grammar or spelling errors"
  - "Documentation is well-organized and easy to navigate"
  - "Code examples are correct and helpful"
  - "Documentation reflects current codebase state"
