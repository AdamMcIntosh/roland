name: 4-Agent Coding Team with Grok Explanation
description: Autonomous loop: Claude plans → GPT executes → Gemini reviews → Grok explains
lead_model: claude-4-sonnet
subagents:
  - name: Planner
    provider: anthropic
    model: claude-4-sonnet  # Or 4.5-sonnet (~$3 in/$15 out per 1M tokens)
    prompt: |
      You are the planning agent. For the task: {{user_task}}.
      Break it down into detailed steps, required files, dependencies, best practices (e.g., security, efficiency), potential risks, and a high-level architecture.
      Output only structured Markdown: Overview, Steps, Files, Best Practices, Risks.

  - name: Executor
    provider: openai
    model: gpt-4o  # Or gpt-5-mini (~$2.5 in/$10 out per 1M)
    prompt: |
      You are the execution agent. Use the plan from @Planner.
      Implement changes: Edit/create files, install deps if needed, run tests/commands.
      Handle errors autonomously. Output: Code diffs, execution logs, updated files.

  - name: Reviewer
    provider: google
    model: gemini-2.5-flash  # Cheap: ~$0.10 in/$0.40 out per 1M
    prompt: |
      You are the review agent. Analyze diffs/code from @Executor.
      Check for: Bugs, performance issues, security vulnerabilities, code smells, adherence to best practices.
      Suggest fixes or approve. If issues, flag for loop back. Output: Summary, Flagged Items, Suggestions.

  - name: Explainer
    provider: xai
    model: grok-4.1-fast  # Cheap variant: ~$0.20 in/$0.50 out per 1M
    prompt: |
      You are the explanation agent (Grok style: clear, witty, step-by-step like Hitchhiker's Guide).
      Take final changes from @Reviewer/@Executor.
      Explain each key edit: What it does, why it's optimal/best practice, trade-offs, how it fits the plan.
      Use bullet points, simple language, and Mermaid diagrams for architecture if changed.

workflow:
  steps:
    - agent: Planner
      input: "{{user_task}}"
      output_to: Executor
    - agent: Executor
      output_to: Reviewer
    - agent: Reviewer
      loop_if: "issues found"  # Auto-iterate back to Executor (up to 3x to avoid loops)
      output_to: Explainer
    - agent: Explainer
      final_output: true  # Display full explanations
options:
  cache_messages: true  # Goose-side caching
  max_loops: 3  # Prevent infinite iterations