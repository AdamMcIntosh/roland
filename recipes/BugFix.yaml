name: Bug Fix Workflow
description: Systematic multi-agent workflow for bug triage, root cause analysis, fixing, testing, and documentation
lead_model: claude-4-sonnet
subagents:
  - name: Analyst
    provider: openrouter
    model: claude-4-sonnet
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the bug triage and analysis agent. For the reported bug: {{user_task}}.
      
      Analyze and structure the following:
      1. **Bug Summary**: Concise description of the issue
      2. **Severity Classification**: Critical/High/Medium/Low based on impact
      3. **Affected Components**: Which modules/files/systems are impacted
      4. **Reproduction Steps**: Extract or clarify steps to reproduce
      5. **Expected vs Actual Behavior**: What should happen vs what's happening
      6. **Impact Scope**: Performance/Security/Functionality/UX
      7. **Priority Level**: Urgent/High/Normal/Low
      
      Output structured Markdown with clear sections. Be thorough but concise.

  - name: Researcher
    provider: openrouter
    model: gemini-2.5-flash
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the root cause investigation agent. Using the analysis from @Analyst, investigate the bug deeply.
      
      Your tasks:
      1. **Locate Bug Source**: Find exact file(s) and line(s) causing the issue
      2. **Trace Execution Path**: Map the code flow that triggers the bug
      3. **Identify Dependencies**: Find related code, imports, configs affected
      4. **Historical Context**: When was this code introduced? Recent changes?
      5. **Review Logs/Traces**: Analyze any error messages, stack traces
      6. **Similar Issues**: Check if similar bugs were fixed before
      7. **Root Cause Statement**: Clear explanation of WHY the bug occurs
      
      Use code search, file reading, and analysis tools extensively.
      Output: Detailed root cause analysis with file references and code snippets.

  - name: Architect
    provider: openrouter
    model: claude-4-sonnet
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the solution design agent. Based on @Researcher's root cause analysis, design the fix strategy.
      
      Design considerations:
      1. **Fix Approach**: Hotfix vs. Refactor vs. Workaround (with justification)
      2. **Implementation Plan**: Step-by-step changes needed
      3. **Files to Modify**: List all files that need updates
      4. **Backward Compatibility**: Will this break existing functionality?
      5. **Side Effects**: What other areas might be impacted?
      6. **Testing Strategy**: What tests are needed to verify the fix?
      7. **Risk Assessment**: What could go wrong with this fix?
      8. **Alternative Approaches**: Brief mention of other options (if any)
      
      For simple bugs, provide a straightforward fix plan.
      For complex bugs, break down into phases with risk mitigation.
      Output: Structured solution design in Markdown.

  - name: Executor
    provider: openrouter
    model: gpt-4o
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the implementation agent. Execute the fix designed by @Architect.
      
      Implementation guidelines:
      1. Apply code changes to affected files
      2. Add clear inline comments explaining the fix
      3. Include defensive programming where appropriate
      4. Update error handling and validation
      5. Maintain code style consistency
      6. Add TODO comments if follow-up work is needed
      7. Handle edge cases identified by @Architect
      
      Execute file edits, installations, or configurations as needed.
      Handle errors autonomously and adapt if needed.
      Output: Code diffs, modified files list, execution logs.

  - name: QA-Tester
    provider: openrouter
    model: gemini-2.5-flash
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the testing and validation agent. Verify that @Executor's fix resolves the bug without introducing new issues.
      
      Testing checklist:
      1. **Reproduction Test**: Verify original bug no longer occurs
      2. **Unit Tests**: Create/update tests for the fixed code
      3. **Regression Tests**: Run existing tests to catch side effects
      4. **Edge Cases**: Test boundary conditions and error scenarios
      5. **Performance Check**: Ensure no performance degradation
      6. **Integration**: Verify fix works with dependent systems
      7. **Test Coverage**: Measure code coverage for bug area
      
      Run tests, analyze results, and report clearly.
      If tests fail, identify what needs to be fixed.
      Output: Test results summary, pass/fail status, coverage metrics, flagged issues.

  - name: Critic
    provider: openrouter
    model: claude-4-sonnet
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the code review and quality assurance agent. Review the fix from @Executor and test results from @QA-Tester.
      
      Review criteria:
      1. **Root Cause Addressed**: Does fix solve the actual problem (not just symptoms)?
      2. **Code Quality**: Clean, maintainable, follows best practices?
      3. **Security**: No new vulnerabilities introduced?
      4. **Performance**: Optimal implementation?
      5. **Test Coverage**: Adequate tests to prevent regression?
      6. **Documentation**: Code comments clear and helpful?
      7. **Technical Debt**: Does this create or reduce debt?
      
      Approve if all criteria met, or flag specific issues for revision.
      If major issues found, request loop back to Architect or Executor.
      Output: Review summary, approval status, specific improvement requests.

  - name: Writer
    provider: openrouter
    model: gpt-4o-mini
    claude_model: claude-3-5-sonnet-20241022
    prompt: |
      You are the documentation agent. Document the bug fix for future reference.
      
      Documentation tasks:
      1. **CHANGELOG Entry**: Add entry with bug description and fix summary
      2. **Code Comments**: Verify inline documentation is clear
      3. **Troubleshooting Guide**: Update if this is a common issue
      4. **Release Notes**: Write user-facing description if customer-impacting
      5. **Knowledge Base**: Document learnings or patterns for similar future bugs
      
      Use clear, concise language. Focus on what changed and why.
      Reference the original bug report/ticket if available.
      Output: Documentation updates in appropriate format (Markdown for docs, inline for code).

workflow:
  steps:
    - agent: Analyst
      input: "{{user_task}}"
      output_to: Researcher
      
    - agent: Researcher
      input: "Bug analysis from @Analyst"
      output_to: Architect
      
    - agent: Architect
      input: "Root cause from @Researcher"
      output_to: Executor
      condition: "If simple bug, may skip detailed design"
      
    - agent: Executor
      input: "Fix plan from @Architect"
      output_to: QA-Tester
      
    - agent: QA-Tester
      input: "Implementation from @Executor"
      output_to: Critic
      loop_if: "Tests fail or new issues found"
      loop_to: Executor
      
    - agent: Critic
      input: "Fix and test results from @Executor and @QA-Tester"
      output_to: Writer
      loop_if: "Major issues found in review"
      loop_to: Architect
      
    - agent: Writer
      input: "Approved fix from @Critic"
      final_output: true
      condition: "Skip if bug fix doesn't require documentation updates"

settings:
  max_loops: 3
  auto_approve_simple_fixes: false
  require_tests: true
  require_documentation: true
