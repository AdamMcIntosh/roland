name: standard-code-loop
description: >
  Canonical software loop — plan work, implement, verify with tests/lint,
  critique output, retry on failure, observe state before next iteration.
phases:
  - phase: plan
    label: Plan
    agent: lead-pm
  - phase: act
    label: Act
    agent: executor
  - phase: verify
    label: Verify
    agent: test-executor
    verification:
      - unit
      - lint
      - typecheck
  - phase: critique
    label: Critique
    agent: critic
    # Analyzes verify results → retryDecision (proceed | retry | retry_focused | escalate)
  - phase: retry
    label: Retry
    optional: true
    # Runs when critique decides retry/retry_focused; skipped on proceed
  - phase: observe
    label: Observe
maxIterations: 5
maxRetries: 3
# Consecutive verify failures before HITL (independent of maxRetries retry budget)
escalationThreshold: 4
# E2E / dev overrides when isTestMode or ROLAND_LOOP_TEST_MODE=1
testModeMaxRetries: 6
testModeEscalationThreshold: 8
