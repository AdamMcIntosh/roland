name: code-quality-loop
description: >
  Code quality loop — de-sloppify pattern from loops.elorm.xyz. Plan improvements, implement fixes,
  verify lint/unit/typecheck, critique quality gaps, reflect, and loop until clean.
kickoff: >
  Start the Code Quality loop. Goal: recent changes are clean, minimal, and convention-aligned.
  After each iteration run lint and tests, reflect on review findings, and stop when exit conditions pass.
phases:
  - phase: plan
    label: Plan quality work
    agent: lead-pm
  - phase: act
    label: Implement fixes
    agent: executor
  - phase: verify
    label: Quality gates
    agent: test-executor
    verification:
      - lint
      - unit
      - typecheck
  - phase: critique
    label: Critique quality
    agent: critic
  - phase: retry
    label: Retry focused fixes
    optional: true
  - phase: observe
    label: Observe metrics
    agent: researcher
  - phase: reflect
    label: Reflection pass
    optional: true
    agent: critic
maxIterations: 4
maxRetries: 3
escalationThreshold: 4
testModeMaxRetries: 6
testModeEscalationThreshold: 8
min_confidence: 0.8
between_iterations: npm run lint && npm test
reflection: true
exit_conditions:
  - type: all_gates_pass
    description: Lint, unit, and typecheck gates pass
  - type: command_success
    description: Lint and test command exits 0
