name: research-synthesis-loop
description: >
  Research synthesis loop — plan investigation, gather and synthesize intel,
  verify findings, critique synthesis quality, retry gaps, observe learnings.
phases:
  - phase: plan
    label: Plan research
    agent: lead-pm
  - phase: act
    label: Research & synthesize
    agent: researcher
  - phase: verify
    label: Validate findings
    agent: critic
  - phase: critique
    label: Critique synthesis
    agent: critic
  - phase: retry
    label: Retry research gaps
    optional: true
  - phase: observe
    label: Record learnings
maxIterations: 3
maxRetries: 2
escalationThreshold: 3
testModeMaxRetries: 5
testModeEscalationThreshold: 6
