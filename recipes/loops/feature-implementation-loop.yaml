name: feature-implementation-loop
description: >
  Feature delivery loop (loops.elorm.xyz pattern) — plan scope, implement, verify, critique,
  reflect learnings, run between-iteration checks, exit when gates green and confidence stable.
kickoff: >
  Start the Feature Implementation loop. Goal: feature is implemented with tests passing and
  integration smoke green. Self-pace: after each iteration run the check command, read output,
  reflect on learnings, and only continue if exit conditions are not met.
phases:
  - phase: plan
    label: Plan feature
    agent: lead-pm
  - phase: act
    label: Implement
    agent: executor
  - phase: verify
    label: Verify feature
    agent: test-executor
    verification:
      - unit
      - integration
      - smoke
  - phase: critique
    label: Critique delivery
    agent: critic
  - phase: retry
    label: Retry implementation
    optional: true
  - phase: observe
    label: Observe state
    agent: researcher
  - phase: reflect
    label: Reflect on iteration
    optional: true
    agent: researcher
maxIterations: 8
maxRetries: 3
escalationThreshold: 4
testModeMaxRetries: 6
testModeEscalationThreshold: 8
min_confidence: 0.85
between_iterations: npm test
reflection: true
exit_conditions:
  - type: all_gates_pass
    description: Unit, integration, and smoke gates pass
  - type: command_success
    description: npm test exits 0
    command: npm test
