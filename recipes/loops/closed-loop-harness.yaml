name: closed-loop-harness
description: >
  Production closed-loop harness — structured kickoff, evaluation gates, between-iteration checks,
  reflection memory, explicit exit conditions, specialist spawning, checkpoint recovery, and PR formatting.
kickoff: >
  Start the closed-loop harness. Self-pace each iteration: implement, verify with evaluation gates,
  critique, reflect on learnings, run the between-iterations check, and stop when exit conditions pass
  or max iterations is reached. Give a short status update each pass.
phases:
  - phase: plan
    label: Plan work
    agent: lead-pm
  - phase: act
    label: Implement changes
    agent: executor
  - phase: verify
    label: Evaluation gates
    agent: test-executor
    verification:
      - lint
      - unit
      - typecheck
  - phase: critique
    label: Self-critique
    agent: critic
  - phase: retry
    label: Smart retry
    optional: true
  - phase: escalate
    label: Human escalation
    optional: true
    agent: lead-pm
  - phase: observe
    label: Observe and record
    agent: researcher
  - phase: reflect
    label: Reflect on learnings
    optional: true
    agent: researcher
maxIterations: 10
maxRetries: 3
escalationThreshold: 4
testModeMaxRetries: 8
testModeEscalationThreshold: 10
timeout_ms: 1800000
exponential_backoff: true
min_confidence: 0.85
between_iterations: npm test
reflection: true
exit_conditions:
  - type: all_gates_pass
    description: All evaluation gates pass with accepted confidence
  - type: confidence_streak
    description: Success confidence ≥ 0.85 for 2 consecutive iterations
    minConfidence: 0.85
    consecutiveIterations: 2
