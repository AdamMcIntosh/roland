routing:
  simple:
    - meta-llama/llama-3.2-3b-instruct:free    # OpenRouter Free (3B, multilingual)
    - openrouter/pony-alpha                     # OpenRouter Free (coding, roleplay)
    - nousresearch/hermes-3-llama-3.1-405b:free # OpenRouter Free (405B flagship)
  medium:
    - stepfun/step-3.5-flash:free               # OpenRouter Free (reasoning, 196B MoE)
    - arcee-ai/trinity-large-preview:free       # OpenRouter Free (400B MoE, creative)
    - meta-llama/llama-3.2-3b-instruct:free    # OpenRouter Free fallback
  complex:
    - nousresearch/hermes-3-llama-3.1-405b:free # OpenRouter Free (most capable)
    - arcee-ai/trinity-large-preview:free       # OpenRouter Free (creative tasks)
    - stepfun/step-3.5-flash:free               # OpenRouter Free (reasoning)
  explain:
    - nousresearch/hermes-3-llama-3.1-405b:free # OpenRouter Free (best for explanations)
    - arcee-ai/trinity-large-preview:free       # OpenRouter Free (comprehensive)
    - stepfun/step-3.5-flash:free               # OpenRouter Free fallback
samwise:
  api_keys:
    openrouter: "YOUR_OPENROUTER_KEY"
  mcp_defaults:
    temperature: 0.7
    max_tokens: 2000