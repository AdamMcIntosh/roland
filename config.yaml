# Roland Model Routing Configuration
#
# Maps complexity tiers to recommended IDE models.
# These are advisory — Roland returns the suggestion, and the IDE (Cursor/VS Code)
# uses it to pick the right model for the task.
#
# Cursor models:  cursor-small, gpt-4o-mini, gpt-4o, claude-3.5-sonnet, claude-3-opus,
#                 gemini-1.5-flash, gemini-1.5-pro, grok-fast, etc.
# VS Code models: whatever GitHub Copilot provides (gpt-4o, claude-sonnet, etc.)

routing:
  simple:
    - cursor-small            # Fast, cheap — typo fixes, renames, small edits
    - gpt-4o-mini             # Good fallback for simple tasks
    - gemini-2.0-flash        # Fast alternative
  medium:
    - gpt-4o                  # Balanced speed/quality for moderate tasks
    - claude-3.5-sonnet       # Strong coding model
    - gemini-1.5-pro          # Good alternative
  complex:
    - claude-3.5-sonnet       # Best for complex architecture/reasoning
    - gpt-4o                  # Strong alternative
    - gemini-1.5-pro          # Capable fallback
  explain:
    - claude-3.5-sonnet       # Best for detailed explanations
    - gpt-4o                  # Good explainer
    - gemini-1.5-pro          # Thorough alternative

roland:
  mcp_defaults:
    temperature: 0.7
    max_tokens: 2000