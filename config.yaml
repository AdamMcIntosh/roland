routing:
  simple:
    - grok-code-fast-1      # Cheapest Grok model
    - gpt-4o-mini
    - gemini-1.5-flash
  medium:
    - grok-3-mini            # Mid-range Grok model
    - gpt-4o
    - gemini-1.5-pro
  complex:
    - grok-3                 # Most capable Grok model
    - gpt-4o
    - claude-3-5-sonnet-20240620
  explain:
    - grok-3                 # Best for explanations
    - gpt-4o
    - claude-3-5-sonnet-20240620
samwise:
  api_keys:
    anthropic: "YOUR_ANTHROPIC_KEY"
    openai: "YOUR_OPENAI_KEY"
    google: "YOUR_GOOGLE_KEY"
    xai: "YOUR_XAI_KEY"
  mcp_defaults:
    temperature: 0.7
    max_tokens: 2000